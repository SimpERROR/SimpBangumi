name: "Publish Release"

on:
  push:
    tags:
      - 'v*'
      - 'V*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] 

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: install dependencies
        run: npm install

      - name: Build and Release Base
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: "SimpBangumi 自动发布的版本。如果你不想安装，请下载绿色免安装版 (`_Portable.exe`)。"
          releaseDraft: true
          prerelease: false

      - name: Prepare Portable Exe
        shell: powershell
        run: |
          cd src-tauri/target/release
          $exeFile = Get-Item *.exe | Where-Object { $_.Attributes -notlike "*Directory*" } | Select-Object -First 1
          
          if ($exeFile) {
              Copy-Item $exeFile.Name "../../SimpBangumi_${{ github.ref_name }}_Portable.exe"
              Write-Host "成功捕获并复制免安装版: $($exeFile.Name)"
          } else {
              Write-Error "未能在 target/release 目录下找到任何核心 .exe 文件！"
              exit 1
          }
          
      - name: Upload Portable Exe to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: SimpBangumi_${{ github.ref_name }}_Portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}